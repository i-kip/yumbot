# ======================================
# YumOff VPN — Nginx config
# Domains:
#   api.yumoff.site     → API + Bot webhook (port 3000)
#   boty.yumoff.site    → Bot webhook alias
#   miniy.yumoff.site   → Mini App (static)
#   lk.yumoff.site      → Web Cabinet (static)
# ======================================

# Rate limit zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

# --- API ---
server {
    listen 80;
    server_name api.yumoff.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.yumoff.site;

    ssl_certificate     /etc/letsencrypt/live/api.yumoff.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yumoff.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    client_max_body_size 1m;

    # Auth routes — stricter rate limit
    location ~ ^/api/v1/auth/(email|telegram) {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bot webhook (no rate limit — Telegram uses fixed IPs)
    location /webhook/bot {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other API
    location / {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

# --- Bot webhook alias ---
server {
    listen 80;
    server_name boty.yumoff.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name boty.yumoff.site;

    ssl_certificate     /etc/letsencrypt/live/boty.yumoff.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/boty.yumoff.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Mini App ---
server {
    listen 80;
    server_name miniy.yumoff.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name miniy.yumoff.site;

    ssl_certificate     /etc/letsencrypt/live/miniy.yumoff.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/miniy.yumoff.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/mini-app;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org";
    add_header Content-Security-Policy "frame-ancestors 'self' https://web.telegram.org https://t.me";

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# --- Web Cabinet ---
server {
    listen 80;
    server_name lk.yumoff.site;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lk.yumoff.site;

    ssl_certificate     /etc/letsencrypt/live/lk.yumoff.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lk.yumoff.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/web;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    add_header Cache-Control "no-cache, no-store, must-revalidate" always;

    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
