<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a56db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d3fa6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="16"/>

  <!-- Glow circles -->
  <circle cx="650" cy="80" r="180" fill="white" fill-opacity="0.04"/>
  <circle cx="150" cy="360" r="140" fill="white" fill-opacity="0.04"/>

  <!-- Drop icon -->
  <path d="M400 90 C400 90 340 160 340 210 C340 243 368 270 400 270 C432 270 460 243 460 210 C460 160 400 90 400 90Z"
        fill="white" fill-opacity="0.95"/>
  <!-- Flame inside drop -->
  <path d="M400 145 C400 145 375 175 375 200 C375 214 386 225 400 225 C414 225 425 214 425 200 C425 175 400 145 400 145Z"
        fill="#1a56db"/>

  <!-- yumoff. text -->
  <text x="400" y="320" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">yumoff.</text>

  <!-- Tagline bullets -->
  <text x="400" y="358" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle">✦ быстрый и безопасный сервис</text>
  <text x="400" y="382" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle">✦ свободный доступ к ресурсам</text>
  <text x="400" y="406" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
        font-size="18" fill="rgba(255,255,255,0.85)" text-anchor="middle">✦ надёжное решение</text>
</svg>
